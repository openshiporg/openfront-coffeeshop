  users(where: UserWhereInput! = {}, orderBy: [UserOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: UserWhereUniqueInput): [User!]
  usersCount(where: UserWhereInput! = {}): Int
  role(where: RoleWhereUniqueInput!): Role
  roles(where: RoleWhereInput! = {}, orderBy: [RoleOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: RoleWhereUniqueInput): [Role!]
  rolesCount(where: RoleWhereInput! = {}): Int
  menuCategory(where: MenuCategoryWhereUniqueInput!): MenuCategory
  menuCategories(where: MenuCategoryWhereInput! = {}, orderBy: [MenuCategoryOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: MenuCategoryWhereUniqueInput): [MenuCategory!]
  menuCategoriesCount(where: MenuCategoryWhereInput! = {}): Int
  menuItem(where: MenuItemWhereUniqueInput!): MenuItem
  menuItems(where: MenuItemWhereInput! = {}, orderBy: [MenuItemOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: MenuItemWhereUniqueInput): [MenuItem!]
  menuItemsCount(where: MenuItemWhereInput! = {}): Int
  menuItemModifier(where: MenuItemModifierWhereUniqueInput!): MenuItemModifier
  menuItemModifiers(where: MenuItemModifierWhereInput! = {}, orderBy: [MenuItemModifierOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: MenuItemModifierWhereUniqueInput): [MenuItemModifier!]
  menuItemModifiersCount(where: MenuItemModifierWhereInput! = {}): Int
  cafeOrder(where: CafeOrderWhereUniqueInput!): CafeOrder
  cafeOrders(where: CafeOrderWhereInput! = {}, orderBy: [CafeOrderOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: CafeOrderWhereUniqueInput): [CafeOrder!]
  cafeOrdersCount(where: CafeOrderWhereInput! = {}): Int
  orderItem(where: OrderItemWhereUniqueInput!): OrderItem
  orderItems(where: OrderItemWhereInput! = {}, orderBy: [OrderItemOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: OrderItemWhereUniqueInput): [OrderItem!]
  orderItemsCount(where: OrderItemWhereInput! = {}): Int
  payment(where: PaymentWhereUniqueInput!): Payment
  payments(where: PaymentWhereInput! = {}, orderBy: [PaymentOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: PaymentWhereUniqueInput): [Payment!]
  paymentsCount(where: PaymentWhereInput! = {}): Int
  paymentProvider(where: PaymentProviderWhereUniqueInput!): PaymentProvider
  paymentProviders(where: PaymentProviderWhereInput! = {}, orderBy: [PaymentProviderOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: PaymentProviderWhereUniqueInput): [PaymentProvider!]
  paymentProvidersCount(where: PaymentProviderWhereInput! = {}): Int
  inventoryItem(where: InventoryItemWhereUniqueInput!): InventoryItem
  inventoryItems(where: InventoryItemWhereInput! = {}, orderBy: [InventoryItemOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: InventoryItemWhereUniqueInput): [InventoryItem!]
  inventoryItemsCount(where: InventoryItemWhereInput! = {}): Int
  stockMovement(where: StockMovementWhereUniqueInput!): StockMovement
  stockMovements(where: StockMovementWhereInput! = {}, orderBy: [StockMovementOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: StockMovementWhereUniqueInput): [StockMovement!]
  stockMovementsCount(where: StockMovementWhereInput! = {}): Int
  loyaltyAccount(where: LoyaltyAccountWhereUniqueInput!): LoyaltyAccount
  loyaltyAccounts(where: LoyaltyAccountWhereInput! = {}, orderBy: [LoyaltyAccountOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: LoyaltyAccountWhereUniqueInput): [LoyaltyAccount!]
  loyaltyAccountsCount(where: LoyaltyAccountWhereInput! = {}): Int
  loyaltyEvent(where: LoyaltyEventWhereUniqueInput!): LoyaltyEvent
  loyaltyEvents(where: LoyaltyEventWhereInput! = {}, orderBy: [LoyaltyEventOrderByInput!]! = [], take: Int, skip: Int! = 0, cursor: LoyaltyEventWhereUniqueInput): [LoyaltyEvent!]
  loyaltyEventsCount(where: LoyaltyEventWhereInput! = {}): Int
  keystone: KeystoneMeta!
  authenticatedItem: AuthenticatedItem
  validateUserPasswordResetToken(email: String!, token: String!): ValidateUserPasswordResetTokenResult
  redirectToInit: Boolean
  getCafeOrder(orderId: ID!, secretKey: String): JSON
  getCafeLoyaltyAccount(email: String!, orderId: ID, secretKey: String): JSON
}

union AuthenticatedItem = User

type ValidateUserPasswordResetTokenResult {
  code: PasswordResetRedemptionErrorCode!
  message: String!
}

type KeystoneMeta {
  adminMeta: KeystoneAdminMeta!
}

type KeystoneAdminMeta {
  lists: [KeystoneAdminUIListMeta!]!
  list(key: String!): KeystoneAdminUIListMeta
}

type KeystoneAdminUIListMeta {
  key: String!
  path: String!
  label: String!
  singular: String!
  plural: String!
  description: String
  pageSize: Int!
  labelField: String!
  fields: [KeystoneAdminUIFieldMeta!]!
  groups: [KeystoneAdminUIFieldGroupMeta!]!
  graphql: KeystoneAdminUIGraphQL!
  initialColumns: [String!]!
  initialSearchFields: [String!]!
  initialSort: KeystoneAdminUISort
  isSingleton: Boolean!
  hideCreate: Boolean!
  hideDelete: Boolean!
  isHidden: Boolean!
  itemQueryName: String!
  listQueryName: String!
}

type KeystoneAdminUIFieldMeta {
  path: String!
  label: String!
  description: String
  isOrderable: Boolean!
  isFilterable: Boolean!
  isNonNull: [KeystoneAdminUIFieldMetaIsNonNull!]
  fieldMeta: JSON
  viewsIndex: Int!
  customViewsIndex: Int
  createView: KeystoneAdminUIFieldMetaCreateView!
  listView: KeystoneAdminUIFieldMetaListView!
  itemView(id: ID): KeystoneAdminUIFieldMetaItemView
  search: QueryMode
}

enum KeystoneAdminUIFieldMetaIsNonNull {
  read
  create
  update
}

type KeystoneAdminUIFieldMetaCreateView {
  fieldMode: KeystoneAdminUIFieldMetaCreateViewFieldMode!
}

enum KeystoneAdminUIFieldMetaCreateViewFieldMode {
  edit
  hidden
}

type KeystoneAdminUIFieldMetaListView {
  fieldMode: KeystoneAdminUIFieldMetaListViewFieldMode!
}

enum KeystoneAdminUIFieldMetaListViewFieldMode {
  read
  hidden
}

type KeystoneAdminUIFieldMetaItemView {
  fieldMode: KeystoneAdminUIFieldMetaItemViewFieldMode
  fieldPosition: KeystoneAdminUIFieldMetaItemViewFieldPosition
}

enum KeystoneAdminUIFieldMetaItemViewFieldMode {
  edit
  read
  hidden
}

enum KeystoneAdminUIFieldMetaItemViewFieldPosition {
  form
  sidebar
}

type KeystoneAdminUIFieldGroupMeta {
  label: String!
  description: String
  fields: [KeystoneAdminUIFieldMeta!]!
}

type KeystoneAdminUIGraphQL {
  names: KeystoneAdminUIGraphQLNames!
}

type KeystoneAdminUIGraphQLNames {
  outputTypeName: String!
  whereInputName: String!
  whereUniqueInputName: String!
  createInputName: String!
  createMutationName: String!
  createManyMutationName: String!
  relateToOneForCreateInputName: String!
  relateToManyForCreateInputName: String!
  itemQueryName: String!
  listOrderName: String!
  listQueryCountName: String!
  listQueryName: String!
  updateInputName: String!
  updateMutationName: String!
  updateManyInputName: String!
  updateManyMutationName: String!
  relateToOneForUpdateInputName: String!
  relateToManyForUpdateInputName: String!
  deleteMutationName: String!
  deleteManyMutationName: String!
}

